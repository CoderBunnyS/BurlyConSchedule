<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Schedule coming soon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a0a3d"/>
      <stop offset="100%" stop-color="#5a1a6b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0%" stop-color="#ff6fb5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff6fb5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#glow)"/>

  <!-- decorative sparkles -->
  <g fill="#ffd6ec" opacity="0.85">
    <circle cx="120" cy="110" r="3"/>
    <circle cx="680" cy="90" r="2.5"/>
    <circle cx="160" cy="500" r="2"/>
    <circle cx="640" cy="520" r="3"/>
    <circle cx="90" cy="320" r="2"/>
    <circle cx="720" cy="320" r="2.5"/>
    <circle cx="400" cy="80" r="2"/>
    <circle cx="400" cy="540" r="2"/>
  </g>

  <!-- main sparkle icon -->
  <g transform="translate(400 200)" fill="#ffd700">
    <path d="M0 -60 L12 -12 L60 0 L12 12 L0 60 L-12 12 L-60 0 L-12 -12 Z"/>
  </g>
  <g transform="translate(310 150) scale(0.4)" fill="#ffd700" opacity="0.8">
    <path d="M0 -60 L12 -12 L60 0 L12 12 L0 60 L-12 12 L-60 0 L-12 -12 Z"/>
  </g>
  <g transform="translate(490 150) scale(0.4)" fill="#ffd700" opacity="0.8">
    <path d="M0 -60 L12 -12 L60 0 L12 12 L0 60 L-12 12 L-60 0 L-12 -12 Z"/>
  </g>

  <!-- text -->
  <text x="400" y="360" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="56" font-weight="bold" fill="#ffffff">
    Schedule Coming Soon
  </text>
  <text x="400" y="420" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="26" fill="#ffd6ec">
    Check back closer to the con!
  </text>
  <text x="400" y="480" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="20" fill="#ffd6ec" opacity="0.8" font-style="italic">
    Volunteer shifts are available now
  </text>
</svg>